<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR Custom Electric - Man Loader</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- External Stylesheets -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <img src="assets/images/logo.png" alt="CR Custom Electric" class="header-logo" onerror="this.style.display='none'">
            <div class="header-content">
                <h1>Man Loader</h1>
                <p>3-Week Crew Schedule</p>
            </div>
            <div class="header-actions">
                <button class="add-btn" onclick="showAddWorkerModal()">+ Add Worker</button>
                <button class="add-btn" onclick="showAddJobModal()">+ Add Job</button>
            </div>
        </header>

        <!-- 3-Week Lookahead Schedule -->
        <div class="main-content">
            <div class="schedule-wrapper">
                <div class="schedule-nav">
                    <button class="schedule-nav-btn" onclick="shiftScheduleWeek(-1)">&#8249; Prev</button>
                    <span class="schedule-week-range" id="scheduleWeekRange">Loading...</span>
                    <button class="schedule-nav-btn" onclick="shiftScheduleWeek(1)">Next &#8250;</button>
                </div>
                <div class="schedule-body">
                    <!-- Team Roster -->
                    <div class="schedule-roster" id="scheduleRoster"
                         ondragover="event.preventDefault(); this.classList.add('roster-drag-over')"
                         ondragleave="this.classList.remove('roster-drag-over')"
                         ondrop="dropWorkerToRoster(event)">
                        <div class="roster-header">
                            <h3>Team Roster</h3>
                            <select id="rosterDivisionFilter" onchange="renderSchedule()">
                                <option value="all">All</option>
                                <option value="commercial">Commercial</option>
                                <option value="residential">Residential</option>
                            </select>
                        </div>
                        <div class="roster-workers" id="rosterWorkers"></div>
                    </div>
                    <!-- Schedule Grid -->
                    <div class="schedule-grid-container">
                        <div id="scheduleGrid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Worker Modal -->
    <div class="modal" id="addWorkerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Worker</h2>
                <button class="close-btn" onclick="closeAddWorkerModal()">×</button>
            </div>
            <form id="workerForm">
                <div class="form-group">
                    <label for="workerName">Worker Name</label>
                    <input type="text" id="workerName" placeholder="e.g., John Smith" required>
                </div>
                <div class="form-group">
                    <label for="workerRole">Role</label>
                    <select id="workerRole" required>
                        <option value="">Select Role</option>
                        <option value="foreman">Foreman</option>
                        <option value="journeyman">Journeyman</option>
                        <option value="apprentice">Apprentice</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="workerDivision">Division</label>
                    <select id="workerDivision" required>
                        <option value="">Select Division</option>
                        <option value="commercial">Commercial</option>
                        <option value="residential">Residential</option>
                        <option value="both">Both</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Add Worker</button>
            </form>
            <div class="worker-list" id="workerList"></div>
        </div>
    </div>

    <!-- Add Job Modal -->
    <div class="modal" id="addJobModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Job</h2>
                <button class="close-btn" onclick="closeAddJobModal()">×</button>
            </div>
            <form id="jobForm">
                <div class="form-group">
                    <label for="jobName">Job Name</label>
                    <input type="text" id="jobName" placeholder="e.g., Downtown Office Building" required>
                </div>
                <div class="form-group">
                    <label for="jobDivision">Division</label>
                    <select id="jobDivision" required>
                        <option value="">Select Division</option>
                        <option value="commercial">Commercial</option>
                        <option value="residential">Residential</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="jobLocation">Location</label>
                    <input type="text" id="jobLocation" placeholder="e.g., 123 Main St">
                </div>
                <button type="submit" class="btn-primary">Add Job</button>
            </form>
            <div class="job-list" id="jobList"></div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2 id="confirmModalTitle">Confirm</h2>
                <button class="close-btn" onclick="closeConfirmModal()">×</button>
            </div>
            <p class="modal-message" id="confirmModalMessage"></p>
            <div class="modal-actions">
                <button class="btn-secondary" id="confirmModalCancel">Cancel</button>
                <button class="btn-primary" id="confirmModalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Prompt Modal -->
    <div class="modal" id="promptModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2 id="promptModalTitle">Edit</h2>
                <button class="close-btn" onclick="closePromptModal()">×</button>
            </div>
            <p class="modal-message" id="promptModalMessage"></p>
            <div class="form-group">
                <input type="text" id="promptModalInput" placeholder="Enter value">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="promptModalCancel">Cancel</button>
                <button class="btn-primary" id="promptModalConfirm">OK</button>
            </div>
        </div>
    </div>

    <!-- Edit Job Modal -->
    <div class="modal" id="editJobModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Edit Job</h2>
                <button class="close-btn" onclick="closeEditJobModal()">×</button>
            </div>
            <form id="editJobForm">
                <div class="form-group">
                    <label for="editJobName">Job Name</label>
                    <input type="text" id="editJobName" placeholder="e.g., Downtown Office Building" required>
                </div>
                <div class="form-group">
                    <label for="editJobDivision">Division</label>
                    <select id="editJobDivision" required>
                        <option value="">Select Division</option>
                        <option value="commercial">Commercial</option>
                        <option value="residential">Residential</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editJobLocation">Location</label>
                    <input type="text" id="editJobLocation" placeholder="e.g., 123 Main St">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeEditJobModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
